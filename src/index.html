                          ${['$0 - $500.000', '$500.000 - $1.000.000', '$1.000.000+'].map(price => `
                            <label class="flex items-center gap-3 cursor-pointer group">
                              <input type="checkbox" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary">
                              <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">${price}</span>
                            </label>
                          `).join('')}
                        </div>
                      </div>

                      <div>
                        <h4 class="font-bold text-sm text-primary mb-4">Duración</h4>
                        <div class="space-y-3">
                          ${['3 días', '5 días', '1 semana', '2 semanas'].map(dur => `
                            <label class="flex items-center gap-3 cursor-pointer group">
                              <input type="checkbox" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary">
                              <span class="text-sm text-on-surface-variant group-hover:text-primary transition-colors">${dur}</span>
                            </label>
                          `).join('')}
                        </div>
                      </div>
                    </div>
                  </div>
                </aside>

                <!-- Main Content -->
                <div class="lg:w-3/4">
                  <div class="mb-8 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-primary italic">Explora el Catálogo</h2>
                    <span class="text-sm text-on-surface-variant">Mostrando ${startIndex + 1}-${Math.min(endIndex, appData.destinations.length)} de ${appData.destinations.length} destinos</span>
                  </div>

                  <div class="space-y-8">
                    ${displayedDestinations.map(dest => `
                      <div class="bg-white rounded-3xl overflow-hidden shadow-sm flex flex-col md:flex-row group border border-outline-variant/10">
                        <div class="md:w-2/5 relative overflow-hidden h-64 md:h-auto">
                          <img src="${dest.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="${dest.name}">
                          <button class="absolute top-4 right-4 bg-white/80 backdrop-blur-md p-2 rounded-full text-primary hover:bg-white transition-colors">
                            <span class="material-symbols-outlined">favorite</span>
                          </button>
                        </div>
                        <div class="p-8 md:w-3/5 flex flex-col">
                          <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2 text-on-surface-variant text-sm">
                              <span class="material-symbols-outlined text-sm">location_on</span>
                              <span>${dest.region}</span>
                            </div>
                            <span class="text-2xl font-bold text-primary italic">${dest.price}</span>
                          </div>
                          
                          <h3 class="text-2xl font-bold text-primary italic mb-2">${dest.name} <span class="text-sm font-normal text-on-surface-variant ml-2">${dest.category || ''}</span></h3>
                          
                          <div class="flex gap-6 mb-4 text-sm text-on-surface-variant">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">group</span> ${dest.people || 10} Personas</span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span> ${dest.duration || '3 días'}</span>
                          </div>

                          <p class="text-on-surface-variant mb-6 line-clamp-2">${dest.description}</p>

                          <div class="flex items-center gap-1 mb-6">
                            ${Array(5).fill(0).map((_, i) => `
                              <span class="material-symbols-outlined text-sm ${i < Math.floor(dest.rating || 4.5) ? 'text-secondary' : 'text-outline-variant'}">star</span>
                            `).join('')}
                            <span class="text-xs text-on-surface-variant ml-2">(${dest.reviews || 45} Reseñas)</span>
                          </div>

                          <div class="flex gap-4 mt-auto">
                            <button onclick="navigateTo('booking', '${dest.id}')" class="flex-1 border border-primary text-primary font-bold py-3 rounded-xl hover:bg-primary/5 transition-colors">Detalles</button>
                            <button onclick="navigateTo('booking', '${dest.id}')" class="flex-1 silk-gradient text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-xl transition-all">Reservar</button>
                          </div>
                        </div>
                      </div>
                    `).join('')}
                  </div>

                  <!-- Pagination -->
                  <div class="mt-12 flex justify-center items-center gap-2">
                    <button onclick="changeViajaxpassPage(${currentPage - 1})" class="w-10 h-10 flex items-center justify-center rounded-xl border border-outline-variant text-primary hover:bg-primary/5 disabled:opacity-30" ${currentPage === 1 ? 'disabled' : ''}>
                      <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                    
                    ${Array(totalPages).fill(0).map((_, i) => `
                      <button onclick="changeViajaxpassPage(${i + 1})" class="w-10 h-10 flex items-center justify-center rounded-xl font-bold transition-all ${currentPage === i + 1 ? 'silk-gradient text-white shadow-md' : 'border border-outline-variant text-primary hover:bg-primary/5'}">
                        ${i + 1}
                      </button>
                    `).join('')}

                    <button onclick="changeViajaxpassPage(${currentPage + 1})" class="w-10 h-10 flex items-center justify-center rounded-xl border border-outline-variant text-primary hover:bg-primary/5 disabled:opacity-30" ${currentPage === totalPages ? 'disabled' : ''}>
                      <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                  </div>
                </div>
              </div>
            </main>
            ${renderFooter()}
          `;
        },
        privacy: () => `
          ${renderHeader()}
          <main class="pt-32 px-8 max-w-4xl mx-auto pb-24">
            <div class="mb-12">
              <span class="text-secondary font-bold tracking-widest uppercase text-xs mb-2 block">Información Legal</span>
              <h1 class="text-4xl md:text-5xl font-bold text-primary italic mb-6">Términos y Condiciones & Política de Privacidad</h1>
              <p class="text-on-surface-variant font-bold mb-8">ViajaXColombia | Agencia de Viajes y Experiencias</p>
            </div>
            
            <div class="prose prose-primary max-w-none space-y-8 text-on-surface-variant leading-relaxed">
              <p>
                En ViajaXColombia, nos comprometemos a proteger la privacidad de los usuarios y garantizar el adecuado tratamiento de la información proporcionada a través de la plataforma. La aplicación puede recopilar datos básicos suministrados voluntariamente por el usuario mediante formularios, tales como nombre, correo electrónico y mensajes, así como información de uso almacenada de manera local en el dispositivo (por ejemplo, favoritos), con fines exclusivamente funcionales.
              </p>
              
              <p>
                La información recopilada se utiliza únicamente para gestionar solicitudes de contacto, mejorar la experiencia de navegación y habilitar funcionalidades del sistema. En esta fase del proyecto, los datos no son almacenados en servidores externos, ya que el aplicativo utiliza tecnologías de almacenamiento local como localStorage, lo que implica que la información permanece en el dispositivo del usuario y no es compartida con terceros ni utilizada con fines comerciales no autorizados.
              </p>
              
              <p>
                Asimismo, se implementan medidas básicas de seguridad para proteger la información, sin perjuicio de que el usuario reconoce los riesgos inherentes al uso de plataformas digitales. El usuario podrá ejercer sus derechos de acceso, actualización o eliminación de datos, así como abstenerse de suministrar información personal. ViajaXColombia se reserva el derecho de modificar esta política en cualquier momento, y el uso continuo de la plataforma implica la aceptación de estos términos.
              </p>
            </div>

            <div class="mt-16 p-8 bg-surface-container-low rounded-3xl border border-outline-variant/10">
              <h3 class="text-xl font-bold text-primary italic mb-4">Contacto Legal</h3>
              <p class="text-sm">Si tienes dudas sobre el tratamiento de tus datos, puedes escribirnos a <a href="mailto:legal@viajaxcolombia.com" class="text-primary font-bold underline">legal@viajaxcolombia.com</a></p>
            </div>
          </main>
          ${renderFooter()}
        `
      };

      function navigateTo(screen, id) {
        if (id) window.selectedDestinationId = id;
        if (root && screens[screen]) {
          root.innerHTML = screens[screen]();
          window.scrollTo(0, 0);
          window.location.hash = id ? `${screen}/${id}` : screen;
          if (screen === 'booking') updateBookingSummary();
        }
      }

      window.updateBookingSummary = () => {
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const travelersInput = document.getElementById('travelers');
        const subtotalEl = document.getElementById('bookingSubtotal');
        const totalEl = document.getElementById('bookingTotal');
        const priceDisplay = document.getElementById('pricePerPerson');

        if (!startDateInput || !endDateInput || !travelersInput || !subtotalEl || !totalEl || !priceDisplay) return;

        const start = new Date(startDateInput.value);
        const end = new Date(endDateInput.value);
        const travelers = parseInt(travelersInput.value) || 1;
        
        let days = 1;
        if (!isNaN(start.getTime()) && !isNaN(end.getTime())) {
          const diffTime = end - start;
          days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          if (days < 1) days = 1;
        }

        const priceStr = priceDisplay.dataset.price;
        const price = parsePrice(priceStr);
        
        const total = price * travelers * days;
        
        subtotalEl.innerHTML = `${formatPrice(price)} x ${travelers} pers. x ${days} ${days === 1 ? 'día' : 'días'}`;
        totalEl.innerText = formatPrice(total);
      };

      function parsePrice(str) {
        let val = str.replace('$', '').replace(/\s/g, '').toLowerCase();
        if (val.includes('m')) {
          return parseFloat(val.replace(',', '.')) * 1000000;
        }
        if (val.includes('k')) {
          return parseFloat(val.replace(',', '.')) * 1000;
        }
        return parseFloat(val.replace(/\./g, '').replace(',', '.')) || 0;
      }

      function formatPrice(num) {
        return new Intl.NumberFormat('es-CO', {
          style: 'currency',
          currency: 'COP',
          maximumFractionDigits: 0
        }).format(num);
      }

      window.toggleMobileMenu = () => {
        const menu = document.getElementById('mobileMenu');
        if (!menu) return;
        const sidebar = menu.querySelector('div');
        
        if (menu.classList.contains('hidden')) {
          menu.classList.remove('hidden');
          setTimeout(() => {
            menu.classList.add('opacity-100');
            sidebar.classList.remove('translate-x-full');
          }, 10);
        } else {
          menu.classList.remove('opacity-100');
          sidebar.classList.add('translate-x-full');
          setTimeout(() => {
            menu.classList.add('hidden');
          }, 300);
        }
      };

      window.changeViajaxpassPage = (page) => {
        window.viajaxpassPage = page;
        root.innerHTML = screens.viajaxpass();
        window.scrollTo(0, 0);
      };

      window.navigateTo = navigateTo;

      window.triggerSearch = () => {
        const input = document.getElementById('globalSearch');
        if (input && input.value.trim()) {
          window.currentSearchQuery = input.value.trim();
          navigateTo('search');
        }
      };

      // Initial route
      window.addEventListener('load', () => {
        const hashParts = window.location.hash.replace('#', '').split('/');
        const screen = hashParts[0] || 'home';
        const id = hashParts[1];
        if (id) window.selectedDestinationId = id;
        navigateTo(screen, id);
      });

      window.addEventListener('hashchange', () => {
        const hashParts = window.location.hash.replace('#', '').split('/');
        const screen = hashParts[0] || 'home';
        const id = hashParts[1];
        if (id) window.selectedDestinationId = id;
        navigateTo(screen, id);
      });
    </script>
  </body>
</html>
